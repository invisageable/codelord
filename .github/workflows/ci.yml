name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # Disable GPU acceleration for whisper-rs in CI (simplifies build)
  WHISPER_NO_METAL: 1
  WHISPER_NO_COREML: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libatk1.0-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev cmake libasound2-dev libudev-dev
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all --all-targets -- -D warnings

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libatk1.0-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev cmake libasound2-dev libudev-dev
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libatk1.0-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev cmake libasound2-dev libudev-dev
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew list cmake &>/dev/null || brew install cmake
          # Use Xcode's clang for bindgen (always present on macOS runners)
          SDKROOT=$(xcrun --show-sdk-path)
          LIBCLANG_PATH="$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain/usr/lib"
          echo "SDKROOT=$SDKROOT" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=$LIBCLANG_PATH" >> $GITHUB_ENV
          # Force baseline ARM architecture to avoid i8mm issues in CI VM
          echo "CFLAGS=-march=armv8-a+dotprod" >> $GITHUB_ENV
          echo "CXXFLAGS=-march=armv8-a+dotprod" >> $GITHUB_ENV
          echo "BINDGEN_EXTRA_CLANG_ARGS=-march=armv8-a+dotprod --sysroot=$SDKROOT" >> $GITHUB_ENV
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libatk1.0-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev cmake libasound2-dev libudev-dev
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew list cmake &>/dev/null || brew install cmake
          # Use Xcode's clang for bindgen (always present on macOS runners)
          SDKROOT=$(xcrun --show-sdk-path)
          LIBCLANG_PATH="$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain/usr/lib"
          echo "SDKROOT=$SDKROOT" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=$LIBCLANG_PATH" >> $GITHUB_ENV
          # Force baseline ARM architecture to avoid i8mm issues in CI VM
          echo "CFLAGS=-march=armv8-a+dotprod" >> $GITHUB_ENV
          echo "CXXFLAGS=-march=armv8-a+dotprod" >> $GITHUB_ENV
          echo "BINDGEN_EXTRA_CLANG_ARGS=-march=armv8-a+dotprod --sysroot=$SDKROOT" >> $GITHUB_ENV
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release
